<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gennis AI - Call Center Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --bg-dark: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.7);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --glass-border: rgba(255, 255, 255, 0.1);
      --accent: #38bdf8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: radial-gradient(circle at top left, #1e1b4b, #0f172a, #020617);
      color: var(--text-main);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      padding: 1.5rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--glass-border);
      z-index: 10;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      background: linear-gradient(to right, #818cf8, #38bdf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo svg {
      width: 32px;
      height: 32px;
      fill: var(--accent);
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.875rem;
      color: var(--text-muted);
      background: rgba(255, 255, 255, 0.05);
      padding: 0.5rem 1rem;
      border-radius: 9999px;
      border: 1px solid var(--glass-border);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444;
      box-shadow: 0 0 10px rgba(239, 68, 68, 0.5);
    }

    .status-dot.online {
      background: #10b981;
      box-shadow: 0 0 10px rgba(16, 185, 129, 0.5);
    }

    main {
      flex: 1;
      display: flex;
      gap: 1.5rem;
      padding: 1.5rem;
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
      overflow: hidden;
    }

    .sidebar {
      width: 320px;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .card {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      border-radius: 1.5rem;
      border: 1px solid var(--glass-border);
      padding: 1.5rem;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 1rem;
      border-radius: 0.75rem;
      border: none;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), #6366f1);
      color: white;
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
      font-size: 1.125rem;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(79, 70, 229, 0.4);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-main);
      border: 1px solid var(--glass-border);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .btn.active {
      background: rgba(16, 185, 129, 0.2);
      border-color: #10b981;
      color: #10b981;
    }

    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      border-radius: 1.5rem;
      border: 1px solid var(--glass-border);
      overflow: hidden;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
    }

    .messages {
      flex: 1;
      padding: 1.5rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .message {
      max-width: 80%;
      padding: 1rem 1.25rem;
      border-radius: 1.25rem;
      font-size: 0.9375rem;
      line-height: 1.5;
      position: relative;
      animation: messageSlide 0.3s ease-out;
    }

    @keyframes messageSlide {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.assistant {
      align-self: flex-start;
      background: rgba(255, 255, 255, 0.05);
      border-bottom-left-radius: 0.25rem;
      border: 1px solid var(--glass-border);
    }

    .message.user {
      align-self: flex-end;
      background: linear-gradient(135deg, var(--primary), #6366f1);
      border-bottom-right-radius: 0.25rem;
    }

    .message.system {
      align-self: center;
      background: rgba(255, 255, 255, 0.03);
      color: var(--text-muted);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
    }

    .message-input-area {
      padding: 1.5rem;
      background: rgba(15, 23, 42, 0.4);
      border-top: 1px solid var(--glass-border);
      display: flex;
      gap: 1rem;
    }

    #chatInput {
      flex: 1;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      border-radius: 0.75rem;
      padding: 0.75rem 1rem;
      color: white;
      font-family: inherit;
      outline: none;
    }

    #sendBtn {
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 0.75rem;
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .hidden-settings {
      display: none;
    }

    .welcome-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg-dark);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 2rem;
      transition: opacity 0.5s, visibility 0.5s;
    }

    .welcome-overlay.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .welcome-content {
      text-align: center;
      max-width: 500px;
    }

    .welcome-content h1 {
      font-size: 3rem;
      margin-bottom: 1rem;
      font-weight: 700;
    }

    .welcome-content p {
      color: var(--text-muted);
      font-size: 1.125rem;
      margin-bottom: 2rem;
    }
  </style>
</head>

<body>
  <div id="welcomeOverlay" class="welcome-overlay">
    <div class="welcome-content">
      <div class="logo" style="justify-content: center; font-size: 3rem; margin-bottom: 2rem;">
        <svg viewBox="0 0 24 24"><path d="M12,2A10,10,0,1,0,22,12,10,10,0,0,0,12,2Zm0,18a8,8,0,1,1,8-8A8,8,0,0,1,12,20ZM12,6a6,6,0,1,0,6,6A6,6,0,0,0,12,6Zm0,10a4,4,0,1,1,4-4A4,4,0,0,1,12,16Z"/></svg>
        Gennis AI
      </div>
      <p>Assalomu alaykum! Gennis o‘quv markazining sun’iy intellekt operatori bilan suhbatni boshlashga tayyormisiz?</p>
      <button id="startSessionBtn" class="btn btn-primary" style="width: 100%;">Suhbatni boshlash</button>
    </div>
  </div>

  <header>
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M12,2A10,10,0,1,0,22,12,10,10,0,0,0,12,2Zm0,18a8,8,0,1,1,8-8A8,8,0,0,1,12,20ZM12,6a6,6,0,1,0,6,6A6,6,0,0,0,12,6Zm0,10a4,4,0,1,1,4-4A4,4,0,0,1,12,16Z"/></svg>
      Gennis AI Assistant
    </div>
    <div class="status-indicator">
      <div id="statusDot" class="status-dot"></div>
      <span id="connectionStatus">Oflayn</span>
    </div>
  </header>

  <main>
    <div class="sidebar">
      <div class="card">
        <div class="controls">
          <button id="startAudioBtn" class="btn btn-secondary">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
            Mikrofon
          </button>
          <button id="disconnectBtn" class="btn btn-secondary" style="color: #ef4444;">
            Suhbatni yakunlash
          </button>
        </div>
      </div>

      <div class="card">
        <div class="controls">
          <h3 style="font-size: 0.875rem; color: var(--accent); margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.05em;">Ovoz nusxalash</h3>
          <button id="recordSignatureBtn" class="btn btn-secondary">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1v11"/><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
            Namunani yozish
          </button>
          <div id="cloningStatus" style="font-size: 0.75rem; color: var(--text-muted); text-align: center; margin: 0.25rem 0;">Namuna yozilmagan</div>
          <div style="display: flex; align-items: center; justify-content: space-between; padding: 0.5rem; background: rgba(255,255,255,0.03); border-radius: 0.8rem; border: 1px solid var(--glass-border);">
            <span style="font-size: 0.8125rem;">Klonlashni yoqish</span>
            <input type="checkbox" id="cloningToggle" style="width: 1.1rem; height: 1.1rem; cursor: pointer;">
          </div>
        </div>
      </div>
    </div>

    <div class="chat-area">
      <div id="chatContainer" class="messages">
        <div class="message system">Gennis AI operatori bilan bog'lanish uchun "Suhbatni boshlash" tugmasini bosing.</div>
      </div>
      
      <div class="message-input-area">
        <input type="text" id="chatInput" placeholder="Xabar yozing..." autocomplete="off" />
        <button id="sendBtn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </main>

  <div class="hidden-settings">
    <video id="videoPreview" autoplay playsinline muted hidden></video>
    <div id="debugInfo" hidden></div>
    <input type="text" id="model" value="gemini-3.1-flash-live-preview" />
    <textarea id="systemInstructions">
SEN — Gennis o‘quv markazining sun’iy intellekt call center operatorisan.

ASOSIY QOIDALAR:
* Faqat Gennis o‘quv markazi haqida gapir
* Mavzudan chiqma
* Har bir suhbatni LEAD olish bilan yakunlashga harakat qil
* Gapirish uslubing: Muloyim, samimiy va to‘g‘ri o‘zbekcha nutq. Odamlar bilan go‘yo jonli suhbat qurayotgandek, juda muloyim va iliq ohangda gapir.
* Ohang: juda muloyim + samimiy + professional
* Javoblar qisqa, aniq va tushunarli bo‘lsin

MARKAZ HAQIDA MA’LUMOT:
* Nomi: Gennis o‘quv markazi
* Yo‘nalishlar: ingliz tili, rus tili, ona tili, matematika, IT
* Narxlar: 350 000 so‘mdan 550 000 so‘mgacha
* O‘qitish: zamonaviy va samarali usullar
* Sayt: gennis.uz

SUHBAT BOSHLASH:
"Assalomu alaykum! Gennis o‘quv markaziga xush kelibsiz. Sizga qaysi yo‘nalish bo‘yicha ma’lumot kerak?"

ASOSIY MAQSAD:
* Foydalanuvchini qiziqtirish
* Oxirida uning ma’lumotlarini olib, lead sifatida ro‘yxatdan o‘tkazish

LEAD YIG‘ISH QOIDASI:
Agar foydalanuvchi qiziqish bildirsa, bosqichma-bosqich quyidagilarni so‘ra:
1. Ism
2. Familiya
3. Yo‘nalish
4. Vaqt

YIG‘ILGAN MA’LUMOTNI TASDIQLASH:
"Rahmat! Sizni ro‘yxatga qo‘shdim. Tez orada siz bilan bog‘lanishadi."

AGAR FOYDALANUVCHI IKKILANSA:
"Siz xohlasangiz, avval kelib bepul konsultatsiya ham olishingiz mumkin."

AGAR RAD ETSA:
"Yaxshi, agar keyinchalik qiziqsangiz, bemalol murojaat qilishingiz mumkin."

AGAR SAVOL BERILSA:
* Har doim qisqa javob ber
* Keyin yana LEAD yig‘ishga qayt

MASALAN:
"Kurslar narxi 350 mingdan 550 minggacha. Siz qaysi yo‘nalishga qiziqyapsiz?"

AGAR NOANIQ SAVOL BO‘LSA:
"Iltimos, qaysi kurs sizni qiziqtirayotganini aniqlashtirib bera olasizmi?"

AGAR MAVZUDAN CHIQSA:
"Kechirasiz, men faqat Gennis o‘quv markazi haqida ma’lumot bera olaman. Sizga qaysi kurs kerak?"

TAQIQLAR:
* Boshqa markazlarni tavsiya qilma
* Siyosat, din, shaxsiy fikrlar haqida gapirma
* O‘zingdan ma’lumot to‘qima

YAKUNIY MAQSAD:
Har bir suhbat oxirida foydalanuvchidan kamida: ism, familiya, qiziqqan yo‘nalish, kelish vaqtini olib, uni LEAD sifatida tizimga kiritish.
    </textarea>
    <select id="voiceSelect"><option value="Puck">Puck</option></select>
    <input type="range" id="temperature" min="0.1" max="2.0" step="0.1" value="1.0" />
    <input type="checkbox" id="enableInputTranscription" checked />
    <input type="checkbox" id="enableOutputTranscription" checked />
    <input type="checkbox" id="enableGrounding" />
    <input type="checkbox" id="enableAlertTool" checked />
    <input type="checkbox" id="enableCssStyleTool" checked />
    <input type="checkbox" id="disableActivityDetection" />
    <input type="number" id="silenceDuration" value="500" />
    <input type="number" id="prefixPadding" value="500" />
    <select id="endSpeechSensitivity"><option value="END_SENSITIVITY_UNSPECIFIED" selected></option></select>
    <select id="startSpeechSensitivity"><option value="START_SENSITIVITY_UNSPECIFIED" selected></option></select>
    <select id="activityHandling"><option value="ACTIVITY_HANDLING_UNSPECIFIED" selected></option></select>
    <select id="micSelect"><option value="">Default</option></select>
    <select id="cameraSelect"><option value="">Default</option></select>
    <input type="range" id="volume" min="0" max="100" value="80" />
    <span id="volumeValue">80%</span>
    <span id="temperatureValue">1.0</span>
  </div>

  <script src="geminilive.js"></script>
  <script src="mediaUtils.js"></script>
  <script src="tools.js"></script>
  <script src="script.js"></script>
</body>
</html>
